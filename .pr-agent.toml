[pr_reviewer]
# AI 审阅配置 - 针对 Aries AI 团队的严格规则

extra_instructions = """
This is the Aries AI Phone Agent project - an accessibility-focused Android application.
The development team consists of 3 beginners using AI code generation tools (Cursor/Windsurf).

CRITICAL REVIEW POINTS (flag every single one):

1. Kotlin Null Safety (MANDATORY):
   - Flag ANY use of !! operator (强制解包绝对禁止)
   - Use ?. (safe call) or ?: (elvis operator) instead
   - Example: val x = y?.length ?: 0  (correct)
             val x = y!!.length       (wrong)

2. Hardcoded Strings (MANDATORY):
   - ALL user-visible strings must be in res/values/strings.xml
   - NOT in code as literals
   - Example: Toast.makeText(context, getString(R.string.operation_success), ...)

3. Sensitive Information (ZERO TOLERANCE):
   - NO API Keys, Tokens, URLs, Passwords in code
   - Use local.properties or BuildConfig instead
   - Flag if BUILD_CONFIG is being used correctly

4. Android Lifecycle (CRITICAL):
   - Memory leaks check
   - Resource cleanup in onDestroy/onStop
   - Context leaks in callbacks
   - No long-lived references to Activity

5. Thread Safety (CRITICAL):
   - Network requests must not run on main thread
   - Use viewModelScope.launch(Dispatchers.IO)
   - All UI updates must switch to Dispatchers.Main
   - Flag any direct network calls in event handlers

6. Error Handling (MANDATORY):
   - All network/IO/permission operations need try-catch
   - Proper exception logging with Log.e(TAG, "message", e)
   - User-facing errors should show meaningful messages

7. Code Quality Checks:
   - Flag files > 300 lines (should be split)
   - Detect code duplication
   - Check for Android deprecated APIs (AsyncTask, etc.)
   - Flag inconsistent naming conventions

8. File Organization:
   - Ensure only PascalCase class names
   - Functions should be camelCase
   - Constants should be UPPER_SNAKE_CASE

9. Accessibility Features (for Aries AI):
   - All ImageView must have android:contentDescription
   - Button labels must be clear
   - Color contrast must be sufficient for visually impaired users
   - Support for screen readers

10. Kotlin Idioms:
    - Prefer when over if-else chains
    - Use data class for data models
    - Use lazy for one-time initialization
    - Use scope functions (apply, let, also) appropriately

This is a beginner team learning through AI assistance.
Be STRICT but also EDUCATIONAL - explain WHY something is wrong.
"""

num_code_suggestions = 6
ask_and_reflect = true
enable_review_labels_security = true
enable_review_labels_effort = true

[pr_description]
enable_semantic_files_types = true
generate_ai_title = true

[pr_code_suggestions]
num_code_suggestions = 6
extra_instructions = """
When providing suggestions:
1. Always show the COMPLETE corrected code block
2. Explain WHY the change is better (educational style)
3. Reference similar patterns in the existing codebase if applicable
4. Explain what problems the suggested fix prevents
5. Keep language simple - the team is learning
"""
